<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WanderCraft - Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #dee1cc;
      --surface: #ffffff;
      --line: rgba(0, 0, 0, 0.12);
      --line-strong: rgba(0, 0, 0, 0.24);
      --text: #202124;
      --muted: #5f6368;
      --accent: #1a73e8;
      --accent-2: #34a853;
      --accent-dim: rgba(26, 115, 232, 0.1);
      --radius: 18px;
      --font: "DM Sans", system-ui, sans-serif;
      --font-display: syne;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 1rem;
      color: var(--text);
      font-family: var(--font);
      background:
        radial-gradient(ellipse 80% 50% at 10% -10%, rgba(26, 115, 232, 0.1), transparent 55%),
        radial-gradient(ellipse 60% 40% at 90% 10%, rgba(52, 168, 83, 0.08), transparent 50%),
        var(--bg);
    }

    .card {
      width: min(420px, 100%);
      background: var(--surface);
      border: 1px solid var(--line);
      border-color: #051210;
      border-width: 1px;
      border-style: solid;
      border-radius: var(--radius);
      padding: 1.5rem;
      box-shadow: 4px 4px #000000;
    }

    h1 {
      margin: 0 0 0.35rem;
      font-family: var(--font-display);
      font-size: 1.45rem;
      font-weight: 600;
      letter-spacing: -0.02em;
      color: var(--text);
    }

    .sub {
      margin: 0 0 1.5rem;
      font-size: 0.95rem;
      color: var(--muted);
      line-height: 1.5;
    }

    form {
      display: grid;
      gap: 0.85rem;
    }

    label {
      display: grid;
      gap: 0.35rem;
      font-size: 0.68rem;
      color: var(--muted);
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    input {
      width: 100%;
      padding: 0.72rem 0.85rem;
      border-radius: 11px;
      border: 1px solid var(--line);
      background: #f8f9fa;
      color: var(--text);
      font: inherit;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    input::placeholder {
      color: #80868b;
    }

    input:focus {
      outline: none;
      border-color: rgba(26, 115, 232, 0.4);
      box-shadow: 0 0 0 3px var(--accent-dim);
    }

    button {
      margin-top: 0.75rem;
      padding: 0.82rem 1rem;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      font: inherit;
      font-weight: 600;
      font-size: 0.95rem;
      color: #051210;
      background: #3d8df5;
      border-color: #051210;
      border-width: 2px;
      border-style: solid;
      box-shadow: 4px 4px #000000;
      transition: transform 0.15s, box-shadow 0.2s;
    }

    button:hover {
      transform: translateY(-1px);
      box-shadow: 0 14px 34px rgba(26, 115, 232, 0.25);
    }
  </style>
</head>
<body>
  <section class="card" aria-labelledby="login-title">
    <h1 id="login-title">Login</h1>
    <p class="sub">Enter your details to continue to your travel dashboard.</p>

    <form id="login-form">
      <label>
        Name
        <input type="text" name="name" required autocomplete="name" />
      </label>
      <label>
        Phone Number
        <input type="tel" name="phone" required autocomplete="tel" />
      </label>
      <label>
        Email
        <input type="email" name="email" required autocomplete="email" />
      </label>
      <button type="submit">Continue</button>
    </form>
  </section>

  <script>
    (function () {
      "use strict";
      var form = document.getElementById("login-form");
      form.addEventListener("submit", function (event) {
        event.preventDefault();
        var nameInput = form.elements.name && form.elements.name.value.trim();
        if (nameInput) {
          localStorage.setItem("wandercraftName", nameInput);
        }
        window.location.href = "homepage.html";
      });
    })();
  </script>
</body>
</html>
